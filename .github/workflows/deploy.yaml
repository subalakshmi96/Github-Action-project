name: CI-CD

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Docker Login

      uses: docker/login-action@v3

      with:

        username: ${{ secrets.DOCKER_USERNAME }}

        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend

      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-image ./backend

    - name: Push Backend

      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend-image

    - name: Build Frontend

      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-image ./frontend

    - name: Push Frontend

      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend-image

    - name: SonarQube Scan

      uses: SonarSource/sonarqube-scan-action@master

      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
